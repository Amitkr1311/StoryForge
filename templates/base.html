<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}Pitch Visualizer V2.0{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e7390d",
                        "background-light": "#f7f4ee",
                        "background-dark": "#111111",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "bebas": ["Bebas Neue", "sans-serif"],
                        "playfair": ["Playfair Display", "serif"],
                        "serif": ["Playfair Display", "serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    borderWidth: {
                        '3': '3px',
                        '4': '4px',
                    },
                    borderRadius: {
                        "none": "0px",
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px",
                    },
                },
            },
        }
    </script>
    {% block head %}{% endblock head %}
</head>
<body class="bg-background-light font-display text-slate-900 antialiased overflow-x-hidden selection:bg-primary/30 selection:text-primary">
    {% block content %}{% endblock content %}
    {% block scripts %}{% endblock scripts %}
</body>
</html>
